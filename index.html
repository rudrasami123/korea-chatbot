<!DOCTYPE html>
<html>
<head>
  <title>Korean Translator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>🇰🇷 Korean Translator</h2>

  <textarea id="inputText" placeholder="Type in your language..."></textarea>

  <br>

  <button onclick="startVoice()">🎤 Speak</button>
  <button onclick="translateText()">Translate</button>

  <div id="output" style="margin-top:20px; font-size:20px;"></div>
</div>

<script src="script.js"></script>

</body>
</html>
